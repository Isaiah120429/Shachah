<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harp & Honor - Worship Team</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #A7795E;
      font-family: Arial, sans-serif;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #6E3C19;
      border-top-color: #A7795E;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div>Loading Harp & Honor...</div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js"></script>
  
  <script>
    try {
      const firebaseConfig = {
        apiKey: "AIzaSyD__w5lh9b7zg7wUX2-hd4meRTGdBpzeqQ",
        authDomain: "worship-team-app-ac0eb.firebaseapp.com",
        projectId: "worship-team-app-ac0eb",
        storageBucket: "worship-team-app-ac0eb.firebasestorage.app",
        messagingSenderId: "616124787110",
        appId: "1:616124787110:web:67676882cda13aaf3d0767"
      };
      
      // Initialize Firebase
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
        console.log("✅ Firebase initialized successfully!");
      } else {
        console.log("Firebase already initialized");
      }
      
      // Hide loading when Firebase is ready
      setTimeout(() => {
        const loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 1000);
      
    } catch (error) {
      console.error("❌ Firebase initialization error:", error);
      const loading = document.getElementById('loading');
      if (loading) {
        loading.innerHTML = '<div style="color: red;">Firebase Error: ' + error.message + '</div>';
      }
    }
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

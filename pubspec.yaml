name: Shachah
description: "Worship Team Management System - Schedule and Song List Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Core
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2

  # YouTube Player for Band Library
  youtube_player_flutter: ^9.1.3

  # Firebase Dependencies
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.0

  # Push Notifications (OneSignal - replaces FCM)
  onesignal_flutter: ^5.2.5

  # Image Pickers
  image_picker: ^1.1.0
  file_picker: ^8.1.0

  # HTTP (keep for any API calls)
  http: ^1.3.0

  # ✅ Custom Fonts for Splash Screen & App-wide typography
  google_fonts: ^6.2.1

  # ✅ Offline Support - Connectivity checking
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/logoicon.png
    - assets/SHACHAH.png
    - assets/SHACHAHS.png
    - assets/head.jpg

flutter_icons:
  android: true
  image_path: "assets/SHACHAHS.png"